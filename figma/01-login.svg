<svg width="1440" height="900" viewBox="0 0 1440 900" xmlns="http://www.w3.org/2000/svg" font-family="Hind Siliguri, Noto Sans Bengali, Arial, sans-serif">
  <rect x="0" y="0" width="1440" height="900" fill="#f8fafc"/>

  <!-- decorative brand panel, left half -->
  <rect x="0" y="0" width="640" height="900" fill="#4c1d95"/>
  <rect x="0" y="0" width="640" height="900" fill="#7c3aed" opacity="0.55"/>
  <circle cx="120" cy="760" r="220" fill="#8b5cf6" opacity="0.35"/>
  <circle cx="560" cy="140" r="160" fill="#c4b5fd" opacity="0.3"/>

  <g>
    <rect x="64" y="64" width="40" height="40" rx="8" fill="#ffffff"/>
    <text x="76" y="90" font-size="18" font-weight="700" fill="#7c3aed">A</text>
    <text x="118" y="92" font-size="20" font-weight="700" fill="#ffffff">Amar School Management</text>
  </g>

  <text x="64" y="440" font-size="34" font-weight="700" fill="#ffffff">শিক্ষা প্রতিষ্ঠান পরিচালনা,</text>
  <text x="64" y="484" font-size="34" font-weight="700" fill="#ffffff">এক জায়গা থেকে।</text>
  <text x="64" y="524" font-size="15" fill="#ede9fe">শিক্ষার্থী, শিক্ষক, উপস্থিতি, পরীক্ষা ও হিসাব — সব একসাথে।</text>

  <!-- right side: login card -->
  <rect x="820" y="0" width="620" height="900" fill="#f8fafc"/>

  <!-- language + theme switch -->
  <g font-size="12" font-weight="600">
    <rect x="1000" y="40" width="90" height="28" rx="6" fill="#ffffff" stroke="#e2e8f0"/>
    <rect x="1000" y="40" width="45" height="28" rx="6" fill="#7c3aed"/>
    <text x="1013" y="58" fill="#ffffff">বাং</text>
    <text x="1057" y="58" fill="#334155">EN</text>

    <rect x="1100" y="40" width="140" height="28" rx="6" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="1112" y="58" fill="#334155">☀ Light</text>
    <text x="1178" y="58" fill="#94a3b8">Dark</text>
  </g>

  <rect x="960" y="220" width="360" height="460" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>

  <text x="990" y="270" font-size="22" font-weight="700" fill="#0f172a">লগইন করুন</text>
  <text x="990" y="294" font-size="13" fill="#64748b">আপনার অ্যাকাউন্টে প্রবেশ করুন</text>

  <!-- email field -->
  <text x="990" y="330" font-size="12" font-weight="600" fill="#64748b">ইমেইল</text>
  <rect x="990" y="340" width="300" height="40" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="1004" y="365" font-size="13" fill="#94a3b8">owner@example-school.edu.bd</text>

  <!-- password field -->
  <text x="990" y="404" font-size="12" font-weight="600" fill="#64748b">পাসওয়ার্ড</text>
  <rect x="990" y="414" width="300" height="40" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="1004" y="439" font-size="13" fill="#94a3b8">••••••••••</text>

  <text x="1220" y="474" font-size="12" fill="#7c3aed" text-anchor="end">পাসওয়ার্ড ভুলে গেছেন?</text>

  <!-- primary button -->
  <rect x="990" y="494" width="300" height="44" rx="6" fill="#7c3aed"/>
  <text x="1140" y="521" font-size="15" font-weight="600" fill="#ffffff" text-anchor="middle">লগইন করুন</text>

  <text x="1140" y="562" font-size="12" fill="#94a3b8" text-anchor="middle">এক লগইন — School Owner, Staff, Dealer,</text>
  <text x="1140" y="580" font-size="12" fill="#94a3b8" text-anchor="middle">Super Admin ও Government Official সবার জন্য</text>

  <text x="1140" y="640" font-size="11" fill="#cbd5e1" text-anchor="middle">One login page — role determines what you see next (ADR 0003)</text>
</svg>
